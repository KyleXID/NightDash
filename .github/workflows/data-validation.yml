name: Data Validation

on:
  pull_request:
    paths:
      - 'Assets/NightDash/Data/**'
      - 'Assets/NightDash/Scripts/Editor/DataValidator.cs'
      - 'Assets/NightDash/Scripts/Data/**'
  push:
    branches: [main]
    paths:
      - 'Assets/NightDash/Data/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: DataValidator batchmode
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ runner.os }}-${{ hashFiles('Assets/**', 'Packages/**') }}
          restore-keys: |
            Library-${{ runner.os }}-

      - name: Run DataValidator
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          unityVersion: 6000.3.8f1
          buildMethod: NightDash.Editor.DataValidator.RunValidation
          allowDirtyBuild: true
          customParameters: -nographics -batchmode -quit
