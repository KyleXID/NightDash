name: Data Validation

# UNITY_LICENSE 시크릿 설정 전에는 자동 실행을 비활성화한다.
# 설정 완료 후 아래 pull_request / push 트리거를 주석 해제.
on:
  workflow_dispatch:
  # pull_request:
  #   paths:
  #     - 'Assets/NightDash/Data/**'
  #     - 'Assets/NightDash/Scripts/Editor/DataValidator.cs'
  #     - 'Assets/NightDash/Scripts/Data/**'
  # push:
  #   branches: [main]
  #   paths:
  #     - 'Assets/NightDash/Data/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: DataValidator batchmode
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ runner.os }}-${{ hashFiles('Assets/**', 'Packages/**') }}
          restore-keys: |
            Library-${{ runner.os }}-

      - name: Run DataValidator
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          unityVersion: 6000.3.8f1
          buildMethod: NightDash.Editor.DataValidator.RunValidation
          allowDirtyBuild: true
          customParameters: -nographics -batchmode -quit
