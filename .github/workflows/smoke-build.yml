name: Smoke Build (manual)

# 주의: 실제 바이너리 빌드는 UNITY_LICENSE 시크릿 설정된 이후 활성화.
# 수동 트리거 + main 브랜치 주간 스케줄로 실행. PR 게이트에는 포함하지 않음.
on:
  workflow_dispatch:
  schedule:
    # 매주 월요일 03:00 UTC (한국시간 12:00)
    - cron: '0 3 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  smoke-build:
    name: StandaloneWindows64 Smoke Build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        target:
          - StandaloneWindows64
          - StandaloneOSX
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ matrix.target }}-${{ hashFiles('Assets/**', 'Packages/**') }}
          restore-keys: |
            Library-${{ matrix.target }}-

      - name: Build ${{ matrix.target }}
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          unityVersion: 6000.3.8f1
          targetPlatform: ${{ matrix.target }}
          buildName: NightDash
          allowDirtyBuild: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nightdash-${{ matrix.target }}
          path: build/${{ matrix.target }}
          retention-days: 14
